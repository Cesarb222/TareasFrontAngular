<section class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-[#252524] border border-[#C58702] rounded-xl p-8 w-full max-w-md">
        <div class="mb-8">
            <h1 class="text-xl font-medium mb-1 text-[#C58702]" >Registrarse</h1>
            <p class="text-sm text-white">Introduce tus credenciales para continuar</p>

            <h3 *ngIf="errorMensaje" class="text-xl font-medium mb-0 text-red-500">{{errorMensaje}}</h3>
        </div>

        <form [formGroup]="form" (ngSubmit)="register()" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1.5">

                <label class="text-xs font-medium text-white" for="nusuario">Nombre Usuario</label>
                <input formControlName="nombreUsuario" type="email" id="nusuario"
                    class="w-full px-3 h-10 rounded-lg border text-white border-[#C58702] bg-[#424040] text-sm focus:outline-none focus:ring-2 focus:ring-[#F5900A]" />

                <label class="text-xs font-medium text-white" for="email">Email</label>
                <input formControlName="email" type="email" id="email"
                    class="w-full px-3 h-10 rounded-lg border text-white border-[#C58702] bg-[#424040] text-sm focus:outline-none focus:ring-2 focus:ring-[#F5900A]" />
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-medium text-white" for="password">Contraseña</label>
                <div class="relative">
                    <input formControlName="password" [type]="verPassword ? 'text' : 'password'" id="password"
                        class="w-full px-3 pr-10 h-10 rounded-lg border text-white border-[#C58702] bg-[#424040] text-sm focus:outline-none focus:ring-2 focus:ring-[#F5900A]" />
                    <button type="button" (click)="verPassword = !verPassword"
                        class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">

                        <svg xmlns="http://www.w3.org/2000/svg" *ngIf="verPassword" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor" class="size-6 hover:cursor-pointer">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>

                        <svg xmlns="http://www.w3.org/2000/svg"  *ngIf="!verPassword" fill="none" viewBox="0 0 24 24" 
                            stroke-width="1.5" stroke="currentColor" class="size-6 color-[#C58702] hover:cursor-pointer">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>

                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-medium text-white" for="rpassword">Repetir Contraseña</label>
                <div class="relative">
                    <input formControlName="repeatPassword" [type]="verRPassword ? 'text' : 'password'" id="rpassword"
                        class="w-full px-3 pr-10 h-10 rounded-lg border text-white border-[#C58702] bg-[#424040] text-sm focus:outline-none focus:ring-2 focus:ring-[#F5900A]" />
                    <button type="button" (click)="verRPassword = !verRPassword"
                        class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">

                        <svg xmlns="http://www.w3.org/2000/svg" *ngIf="verRPassword" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor" class="size-6 hover:cursor-pointer">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>

                        <svg xmlns="http://www.w3.org/2000/svg"  *ngIf="!verRPassword" fill="none" viewBox="0 0 24 24" 
                            stroke-width="1.5" stroke="currentColor" class="size-6 color-[#C58702] hover:cursor-pointer">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>

                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full h-10 mt-2 bg-[#C58702] text-white rounded-lg text-sm font-medium hover:bg-[#DE9902] hover:cursor-pointer">
                Entrar
            </button>
        </form>
        <a routerLink="/auth/login" class="text-white underline text-balance transition-all duration-300 align-middle text-center hover:text-[#C58702]">¿Ya tienes cuenta? <strong>Pincha aqui</strong></a>
    </div>
</section>
