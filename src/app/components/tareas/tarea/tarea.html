<section class=" flex items-center justify-center bg-[#1f1f1e] p-4">
    @if (tareaParam) {
    <div class="w-full  rounded-xl border border-[#C58702] overflow-hidden text-white text-sm">

        <!-- Header -->
        <div class="flex items-center gap-3 px-4 py-2.5 bg-[#252524] border-b border-[#3a3a38]">
            <span class="bg-[#C58702] text-[#1f1f1e] text-[11px] font-medium px-2 py-0.5 rounded">
                Tarea
            </span>
            <span class="text-xs text-[#888]">#{{ tareaParam.id }} · {{tareaParam.proyecto.nombre}}  ·  {{tareaParam.fechaCreacion}}</span>
            
            
        </div>
        <!-- Título -->
        <div class="px-4 pt-3 pb-1.5 bg-[#252524]">
            <p type="text"name="titulo"
                class="w-full text-lg font-medium bg-transparent border-none text-white outline-none px-1.5 py-1 rounded" > {{tareaParam.titulo}}</p>    
        </div>

        <!-- Toolbar -->
        <div class="flex gap-1.5 px-4 py-2 bg-[#252524] border-b border-[#3a3a38] items-center">
            <button type="submit" form="tareaForm"
                class="flex items-center gap-1.5 bg-[#C58702] text-[#1f1f1e] font-medium text-xs px-4 py-1.5 rounded-md hover:bg-[#DE9902] cursor-pointer">
                <i class="ti ti-device-floppy"></i> Guardar cambios
            </button>
            <button type="button" (click)="discardTask()"
                class="flex items-center gap-1.5 border border-[#3a3a38] text-[#ccc] text-xs px-3 py-1.5 rounded-md hover:border-[#C58702] hover:text-[#C58702] cursor-pointer">
                <i class="ti ti-x"></i> Descartar
            </button>
        </div>

        <!-- Body -->
        <form id="tareaForm" method="put" (submit)="updateTask($event)"
            class="grid grid-cols-1 md:grid-cols-[1fr_260px] bg-[#1f1f1e]">

            <!-- Columna principal -->
            <div class="p-5 flex flex-col gap-5 border-b md:border-b-0 md:border-r border-[#3a3a38]">

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-medium uppercase tracking-wide text-[#C58702]"
                        for="titulo2">Título</label>
                    <input type="text" id="titulo2" [value]="tareaParam.titulo" name="titulo"
                        class="w-full px-2.5 py-1.5 text-sm rounded-md border border-[#3a3a38] bg-[#2a2a28] text-white outline-none hover:border-[#C58702] focus:border-[#C58702] focus:ring-2 focus:ring-[#C58702]/25" />
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-medium uppercase tracking-wide text-[#C58702]"
                        for="fechaLimite">Fecha límite</label>
                    <input type="datetime-local" required id="fechaLimite" [value]="tareaParam.fechaLimite" name="fechaLimite"
                        class="w-full px-2.5 py-1.5 text-sm rounded-md border border-[#3a3a38] bg-[#2a2a28] text-white outline-none hover:border-[#C58702] focus:border-[#C58702] focus:ring-2 focus:ring-[#C58702]/25 [color-scheme:dark]" />
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-medium uppercase tracking-wide text-[#C58702]">Descripción</label>
                        <p-editor [(ngModel)]="text" name="descripcion"
                            [style]="{ height: '180px', background: '#1f1f1e', color: '#fff' }" />
                    
                </div>

            </div>

            <!-- Sidebar -->
            <div class="p-4 bg-[#252524] flex flex-col gap-0">
                <p
                    class="text-[11px] font-medium uppercase tracking-wide text-[#C58702] mb-2.5 pb-1.5 border-b border-[#3a3a38]">
                    Planificación</p>

                <div class="flex items-center justify-between py-1.5 border-b border-[#2e2e2c]">
                    <span class="text-xs text-[#888]">Asignado a</span>
                    <select name="asignadoA" id="asignadoA" required
                        class="text-xs bg-transparent border border-transparent text-white rounded px-1.5 py-1 outline-none hover:border-[#3a3a38] hover:bg-[#2a2a28] focus:border-[#C58702] focus:bg-[#2a2a28] cursor-pointer max-w-[140px]">
                        @for (item of listUser; track $index) {
                        <option [value]="item.key" class="bg-[#2a2a28]" [selected]="tareaParam.asignadoA.email == item.key">{{ item.value }}</option>
                        }
                    </select>
                </div>

                <div class="flex items-center justify-between py-1.5">
                    <span class="text-xs text-[#888]">Prioridad</span>
                    <select required name="prioridad"
                        class="text-xs bg-transparent border border-transparent text-white rounded px-1.5 py-1 outline-none hover:border-[#3a3a38] hover:bg-[#2a2a28] focus:border-[#C58702] cursor-pointer">
                        @for (item of listSelectPrioridad ; track $index) {
                            <option class="bg-[#2a2a28]" [value]="item.key.toLowerCase()" [selected]="item.key == tareaParam.prioridad">{{item.value}}</option>
                        }
                    </select>
                </div>

                <div class="flex items-center justify-between py-1.5">
                    <span class="text-xs text-[#888]">Estado</span>
                    <select required name="estado"
                        class="text-xs bg-transparent border border-transparent text-white rounded px-1.5 py-1 outline-none hover:border-[#3a3a38] hover:bg-[#2a2a28] focus:border-[#C58702] cursor-pointer">
                        @for (item of listSelectEstado ; track $index) {
                            <option class="bg-[#2a2a28]" [value]="item.key" [selected]="item.key == tareaParam.estado">{{item.value}}</option>
                        }
                    </select>
                </div>

                <div class="flex items-center justify-between py-1.5">
                    <span class="text-xs text-[#888]">Creado por:</span>
                    
            <span class="text-xs text-white">{{ tareaParam.creadoPor.nombreUsuario }}</span>
                </div>
            </div>

        </form>
    </div>
    }
</section>
